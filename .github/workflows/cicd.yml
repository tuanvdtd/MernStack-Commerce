name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint + Typecheck Frontend
  # ─────────────────────────────────────────────
  lint-frontend:
    name: Lint & Typecheck Frontend
    runs-on: ubuntu-latest
    # Chỉ chạy khi có thay đổi ở front-end
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'front-end/') ||
      contains(toJson(github.event.commits.*.added), 'front-end/')
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Lint + Typecheck Backend
  # ─────────────────────────────────────────────
  lint-backend:
    name: Lint & Typecheck Backend
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'back-end/') ||
      contains(toJson(github.event.commits.*.added), 'back-end/')
    defaults:
      run:
        working-directory: back-end
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Frontend Docker image
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    # Chỉ chạy sau khi lint pass, và chỉ trên push (không phải PR)
    needs: lint-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FE image
        uses: docker/build-push-action@v6
        with:
          context: ./front-end
          file: ./front-end/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flashbuy-fe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Build & Push Backend Docker image
  # ─────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BE image
        uses: docker/build-push-action@v6
        with:
          context: ./back-end
          file: ./back-end/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flashbuy-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
